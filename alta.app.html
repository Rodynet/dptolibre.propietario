<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DptoLibre - Portal del Propietario</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --brand-blue: #0055DD;
            --brand-dark: #0D1B4B;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #cbd5e1;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }

        .mobile-shell {
            width: 100%;
            height: 100vh;
            max-width: 414px;
            margin: 0 auto;
            background: #ffffff;
            position: relative;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.2);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .animate-bubble { animation: bubbleIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes bubbleIn { 
            from { opacity: 0; transform: translateY(15px) scale(0.95); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }

        .bot-bubble {
            @apply bg-slate-50 border border-slate-100 p-4 rounded-tr-[2rem] rounded-br-[2rem] rounded-bl-[2rem] shadow-sm max-w-[85%] text-sm font-medium leading-relaxed text-slate-700;
        }

        .user-bubble {
            @apply bg-[#0055DD] text-white p-4 rounded-tl-[2rem] rounded-bl-[2rem] rounded-br-[2rem] shadow-lg max-w-[80%] text-sm font-bold ml-auto;
        }

        .typing-dot {
            width: 6px; height: 6px; background: #94a3b8; border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name, size, className]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const Logo = ({ light = false }) => (
            <div className={`flex flex-col items-center ${light ? 'text-white' : 'text-[#0D1B4B]'}`}>
                <svg width="45" viewBox="0 0 32 40" fill="none">
                    <path d="M16 0L32 6.4V33.6L16 40V6.4L16 0Z" fill={light ? "white" : "#0055DD"} fillOpacity="0.3"/>
                    <path d="M0 6.4L16 0V33.6L0 40V6.4Z" fill={light ? "white" : "#0055DD"}/>
                </svg>
                <div className="text-base font-extrabold tracking-tighter mt-1">dpto <span className="font-light">libre</span></div>
            </div>
        );

        function OwnerApp() {
            const [view, setView] = useState('login');
            const [emailInput, setEmailInput] = useState('');
            const [hasActiveAccount, setHasActiveAccount] = useState(false);
            
            // Estados para el flujo de propiedades / admin
            const [propCount, setPropCount] = useState(1);
            const [currentPropIndex, setCurrentPropIndex] = useState(0);
            const [adminScope, setAdminScope] = useState('same'); // 'same' o 'different'
            const [sharedAdmin, setSharedAdmin] = useState(null); // Administrador único si eligió 'same'
            
            // Chat IA y datos recolectados
            const [chatStep, setChatStep] = useState(0);
            const [isTyping, setIsTyping] = useState(false);
            const [chatInput, setChatInput] = useState("");
            const [propertiesList, setPropertiesList] = useState([]);
            const [currentProp, setCurrentProp] = useState({ address: '', features: '', adminContact: '', adminFound: null });
            const chatScrollRef = useRef(null);

            const registeredAdmins = [
                { name: "Inmobiliaria Raíces", email: "admin@raices.com", phone: "+54 351 4000000" },
                { name: "Gestiones del Sur", email: "contacto@sur.com", phone: "+54 351 5000000" }
            ];

            useEffect(() => {
                if (chatScrollRef.current) chatScrollRef.current.scrollTop = chatScrollRef.current.scrollHeight;
            }, [chatStep, isTyping, currentProp]);

            const advanceChat = (nextStep, delay = 800) => {
                setIsTyping(true);
                setTimeout(() => {
                    setIsTyping(false);
                    setChatStep(nextStep);
                }, delay);
            };

            const handleChatSend = (customVal) => {
                const val = customVal !== undefined ? customVal : chatInput.trim();
                if (!val && chatStep !== 2) return;
                if (customVal === undefined) setChatInput("");

                if (chatStep === 0) {
                    setCurrentProp(p => ({ ...p, address: val }));
                    advanceChat(1);
                } else if (chatStep === 1) {
                    setCurrentProp(p => ({ ...p, features: val }));
                    advanceChat(2); // Muestra la pregunta del administrador conversacional
                } else if (chatStep === 3) {
                    // Procesamiento de búsqueda de administrador en red
                    setCurrentProp(p => ({ ...p, adminContact: val }));
                    setIsTyping(true);
                    setTimeout(() => {
                        setIsTyping(false);
                        const found = registeredAdmins.find(a => a.email.toLowerCase() === val.toLowerCase() || a.phone.includes(val));
                        setCurrentProp(p => ({ ...p, adminFound: found || null }));
                        if (adminScope === 'same' && currentPropIndex === 0) {
                            setSharedAdmin(found || { name: val, custom: true });
                        }
                        setChatStep(4); // Muestra resultado de la búsqueda de admin
                    }, 1200);
                }
            };

            const saveCurrentPropertyAndContinue = () => {
                const updatedList = [...propertiesList, currentProp];
                setPropertiesList(updatedList);
                
                if (currentPropIndex + 1 < propCount) {
                    setCurrentPropIndex(currentPropIndex + 1);
                    if (adminScope === 'same' && sharedAdmin) {
                        setCurrentProp({ address: '', features: '', adminContact: sharedAdmin.email || sharedAdmin.name, adminFound: sharedAdmin });
                        setChatStep(0);
                    } else {
                        setCurrentProp({ address: '', features: '', adminContact: '', adminFound: null });
                        setChatStep(0);
                    }
                } else {
                    setView('home_owner');
                }
            };

            // --- 1. LOGIN SCREEN CON VERSIÓN VISIBLE ---
            const LoginView = () => (
                <div className="mobile-shell bg-white flex flex-col p-8 justify-center animate-in text-center relative">
                    <div className="absolute top-4 right-4 bg-slate-100 text-slate-500 text-[9px] font-black uppercase px-2 py-1 rounded-md tracking-wider">
                        Versión Propietario V2.5
                    </div>
                    <Logo />
                    <h1 className="text-xl font-black mt-6 text-[#0D1B4B] uppercase tracking-tighter">BIENVENIDO</h1>
                    <p className="text-slate-400 text-xs mt-1 font-medium">Accedé a tu portal inmobiliario.</p>

                    <div className="space-y-3 w-full mt-8">
                        <button onClick={() => setView('role_selection')} className="w-full flex items-center justify-center gap-3 py-4 rounded-2xl font-bold border border-slate-200 text-slate-700 bg-white shadow-sm active:scale-95 transition-all text-sm">
                            <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-1 .67-2.26 1.07-3.71 1.07-2.87 0-5.3-1.94-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.11c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.09H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.91l3.66-2.8z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.09l3.66 2.8c.86-2.59 3.29-4.51 6.16-4.51z" fill="#EA4335"/></svg>
                            Continuar con Google
                        </button>
                        <button onClick={() => setView('role_selection')} className="w-full flex items-center justify-center gap-3 py-4 rounded-2xl font-bold bg-black text-white shadow-lg active:scale-95 transition-all text-sm">
                            <Icon name="apple" size={18} className="fill-white"/> Continuar con Apple
                        </button>

                        <div className="flex items-center gap-4 py-2">
                            <div className="h-[1px] flex-1 bg-slate-100"></div>
                            <span className="text-[10px] font-black text-slate-300 uppercase tracking-widest">o con email propio</span>
                            <div className="h-[1px] flex-1 bg-slate-100"></div>
                        </div>

                        <input 
                            type="email" 
                            placeholder="Email" 
                            value={emailInput}
                            onChange={(e) => setEmailInput(e.target.value)}
                            className="w-full bg-slate-50 border border-slate-200 px-4 py-3.5 rounded-2xl text-sm font-bold outline-none focus:border-[#0055DD]" 
                        />
                        <button onClick={() => setView('role_selection')} className="w-full py-4 rounded-2xl font-black bg-[#0D1B4B] text-white text-xs uppercase tracking-widest shadow-xl active:scale-95 transition-all">
                            Ingresar
                        </button>
                    </div>
                </div>
            );

            // --- 2. SELECCIÓN DE ROL ---
            const RoleSelectionView = () => (
                <div className="mobile-shell bg-white flex flex-col p-8 animate-in justify-center">
                    <h2 className="text-2xl font-black text-[#0D1B4B] tracking-tight mb-2 text-center uppercase">¿Cuál es tu rol?</h2>
                    <p className="text-slate-400 text-xs text-center mb-8">Este flujo es exclusivo para propietarios.</p>
                    <div className="space-y-4">
                        {[
                            { id: 'propietario', label: 'Propietario', desc: 'Tengo inmuebles para cobrar', icon: 'shield' },
                            { id: 'inquilino', label: 'Inquilino / Admin', desc: 'Otra sección de la plataforma', icon: 'user' }
                        ].map(r => (
                            <button 
                                key={r.id} 
                                onClick={() => {
                                    if (r.id === 'propietario') setView('check_active');
                                    else alert("Por favor seleccioná Propietario para continuar con este flujo.");
                                }} 
                                className="w-full p-6 border-2 border-slate-100 rounded-3xl text-left flex items-center gap-4 hover:border-[#0055DD] hover:bg-blue-50/30 transition-all group"
                            >
                                <div className="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-400 group-hover:bg-[#0055DD] group-hover:text-white transition-all">
                                    <Icon name={r.icon} size={22} />
                                </div>
                                <div className="flex-1">
                                    <h4 className="font-black text-[#0D1B4B] text-sm uppercase tracking-tight">{r.label}</h4>
                                    <p className="text-[10px] text-slate-400 font-medium">{r.desc}</p>
                                </div>
                                <Icon name="chevron-right" size={18} className="text-slate-300" />
                            </button>
                        ))}
                    </div>
                </div>
            );

            // --- 3. VALIDACIÓN DE CUENTA ACTIVA ---
            const CheckActiveView = () => (
                <div className="mobile-shell bg-slate-900 text-white flex flex-col justify-center items-center p-8 text-center animate-in">
                    <div className="w-16 h-16 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-6"></div>
                    <h3 className="text-xl font-black uppercase tracking-widest">Consultando red DptoLibre...</h3>
                    <p className="text-xs text-slate-400 mt-2">Verificando si posees unidades precargadas por inmobiliarias.</p>
                    
                    <div className="mt-12 space-y-3 w-full max-w-xs">
                        <button onClick={() => { setHasActiveAccount(true); setView('val_biometric'); }} className="w-full py-4 bg-emerald-500 text-slate-900 font-black text-xs uppercase tracking-widest rounded-xl shadow-lg">
                            Simular: Cuenta Activa (Con Propiedades)
                        </button>
                        <button onClick={() => { setHasActiveAccount(false); setView('val_biometric'); }} className="w-full py-4 bg-white/10 text-white font-black text-xs uppercase tracking-widest rounded-xl border border-white/20">
                            Simular: Cuenta Nueva (Sin Activar)
                        </button>
                    </div>
                </div>
            );

            // --- 4. VALIDACIÓN BIOMÉTRICA ---
            const BiometricValidationView = () => (
                <div className="mobile-shell bg-white flex flex-col p-8 justify-center items-center text-center animate-in">
                    <div className="w-20 h-20 bg-blue-50 text-[#0055DD] rounded-3xl flex items-center justify-center mb-6 shadow-inner">
                        <Icon name="scan-face" size={36} />
                    </div>
                    <h2 className="text-2xl font-black text-[#0D1B4B] uppercase tracking-tighter mb-2">Validación Biométrica</h2>
                    <p className="text-slate-400 text-xs mb-8">Escaneo de DNI y prueba de vida para asegurar tu identidad.</p>
                    
                    <div className="w-full aspect-[3/2] bg-slate-900 rounded-3xl border-4 border-blue-100 flex items-center justify-center text-white/30 mb-8 relative overflow-hidden shadow-xl">
                        <div className="w-full h-1 bg-[#00D1FF] absolute top-1/2 shadow-[0_0_15px_#00D1FF] animate-pulse"></div>
                        <Icon name="camera" size={48} />
                    </div>

                    <button 
                        onClick={() => {
                            if (hasActiveAccount) setView('reconf_propiedades');
                            else setView('count_properties');
                        }} 
                        className="w-full bg-[#0055DD] text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl active:scale-95 transition-all"
                    >
                        Escanear y Validar Identidad
                    </button>
                </div>
            );

            // --- 5A. RECONFIRMACIÓN (SI YA TIENE CUENTA ACTIVA) ---
            const ReconfPropiedadesView = () => (
                <div className="mobile-shell bg-slate-50 flex flex-col p-6 animate-in overflow-y-auto no-scrollbar pb-20">
                    <header className="mb-6 pt-4 text-center">
                        <h2 className="text-xl font-black text-[#0D1B4B] uppercase tracking-tighter">Propiedades Encontradas</h2>
                        <p className="text-xs text-slate-400 mt-1">Reconfirmá tus unidades y asigná su administración.</p>
                    </header>

                    <div className="space-y-4 flex-1">
                        {[
                            { address: "Caseros 1230, 4B", admin: "Inmobiliaria Raíces" },
                            { address: "Av. Hipólito Yrigoyen 850", admin: "Gestiones del Sur" }
                        ].map((p, idx) => (
                            <div key={idx} className="bg-white p-5 rounded-3xl border shadow-sm space-y-3">
                                <div>
                                    <span className="text-[9px] font-black bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded uppercase">Pre-asociada</span>
                                    <h4 className="font-black text-slate-800 text-sm mt-1">{p.address}</h4>
                                </div>
                                <div className="pt-2 border-t border-slate-50 flex justify-between items-center">
                                    <div>
                                        <p className="text-[10px] text-slate-400 font-bold uppercase">Administrador Actual:</p>
                                        <p className="text-xs font-black text-[#0055DD]">{p.admin}</p>
                                    </div>
                                    <button onClick={() => alert("Administrador reconfirmado con éxito.")} className="text-[9px] font-black bg-blue-50 text-[#0055DD] px-3 py-1.5 rounded-lg uppercase">Cambiar Admin</button>
                                </div>
                            </div>
                        ))}
                    </div>

                    <button onClick={() => setView('home_owner')} className="mt-6 w-full bg-[#0055DD] text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg">
                        Confirmar y Ir a mi Inicio
                    </button>
                </div>
            );

            // --- 5B. PREGUNTA: ¿CUÁNTAS PROPIEDADES QUERÉS CARGAR? ---
            const CountPropertiesView = () => (
                <div className="mobile-shell bg-white flex flex-col p-8 animate-in justify-center text-center">
                    <div className="w-16 h-16 bg-blue-50 text-[#0055DD] rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-inner">
                        <Icon name="home" size={32} />
                    </div>
                    <h2 className="text-2xl font-black text-[#0D1B4B] uppercase tracking-tighter mb-2">Tus Inmuebles</h2>
                    <p className="text-slate-400 text-xs mb-8">Bienvenido. ¿Cuántas propiedades deseas que administren en tu cartera?</p>
                    
                    <div className="flex gap-3 justify-center mb-8">
                        {[1, 2, 3, 4].map(num => (
                            <button 
                                key={num}
                                onClick={() => setPropCount(num)}
                                className={`w-14 h-14 rounded-2xl font-black text-lg transition-all ${propCount === num ? 'bg-[#0055DD] text-white shadow-lg' : 'bg-slate-50 text-slate-700 border'}`}
                            >
                                {num}
                            </button>
                        ))}
                    </div>

                    {propCount > 1 && (
                        <div className="mb-8 p-4 bg-slate-50 rounded-2xl border text-left animate-in">
                            <p className="text-xs font-bold text-slate-700 mb-2 uppercase">¿Van a ser gestionadas por un mismo administrador?</p>
                            <div className="flex gap-2">
                                <button onClick={() => setAdminScope('same')} className={`flex-1 py-3 rounded-xl font-black text-[10px] uppercase border ${adminScope === 'same' ? 'bg-[#0055DD] text-white' : 'bg-white text-slate-600'}`}>Sí, mismo admin</button>
                                <button onClick={() => setAdminScope('different')} className={`flex-1 py-3 rounded-xl font-black text-[10px] uppercase border ${adminScope === 'different' ? 'bg-[#0055DD] text-white' : 'bg-white text-slate-600'}`}>No, distinto admin</button>
                            </div>
                        </div>
                    )}

                    <button 
                        onClick={() => {
                            setCurrentPropIndex(0);
                            setPropertiesList([]);
                            setSharedAdmin(null);
                            setCurrentProp({ address: '', features: '', adminContact: '', adminFound: null });
                            setView('chat_propiedad');
                        }} 
                        className="w-full bg-[#0055DD] text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl active:scale-95 transition-all"
                    >
                        Comenzar Carga Inteligente
                    </button>
                </div>
            );

            // --- 6. CHAT IA - CARGA DE PROPIEDAD Y ADMINISTRADOR CON PREGUNTA CONCRETA Y BÚSQUEDA REAL EN RED ---
            const ChatPropiedadView = () => (
                <div className="mobile-shell bg-slate-50 flex flex-col animate-in">
                    <header className="p-4 bg-white border-b flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-blue-50 text-[#0055DD] rounded-xl flex items-center justify-center">
                                <Icon name="sparkles" size={20} />
                            </div>
                            <div>
                                <h3 className="text-xs font-black uppercase tracking-wider text-slate-800">Asistente DptoLibre</h3>
                                <p className="text-[9px] text-emerald-500 font-bold uppercase">Propiedad {currentPropIndex + 1} de {propCount}</p>
                            </div>
                        </div>
                        <span className="text-[10px] font-black text-slate-400 bg-slate-100 px-2 py-1 rounded">Paso {chatStep + 1}</span>
                    </header>

                    <div ref={chatScrollRef} className="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar pb-32">
                        {/* Resumen si venimos de cargar una propiedad previa */}
                        {currentPropIndex > 0 && chatStep === 0 && (
                            <div className="p-3 bg-emerald-50 border border-emerald-200 rounded-2xl text-[11px] text-emerald-800 animate-bubble">
                                ✓ <b>Propiedad anterior guardada:</b> {propertiesList[propertiesList.length - 1].address} <br/>
                                <span className="text-[9px] text-emerald-600">Admin asignado: {propertiesList[propertiesList.length - 1].adminFound?.name || propertiesList[propertiesList.length - 1].adminContact}</span>
                            </div>
                        )}

                        {/* 0. Dirección */}
                        <div className="bot-bubble animate-bubble">
                            <p>¡Hola! Vamos a dar de alta la propiedad {currentPropIndex + 1} en tu cartera.</p>
                            <p className="mt-1 text-[#0055DD] font-bold italic">¿Cuál es la dirección exacta del inmueble?</p>
                        </div>

                        {chatStep >= 1 && <div className="user-bubble animate-bubble">{currentProp.address}</div>}
                        {chatStep === 1 && !isTyping && (
                            <div className="bot-bubble animate-bubble space-y-3">
                                <p>¡Excelente! Geolocalizado por Google Maps:</p>
                                <div className="bg-white p-3 rounded-2xl border shadow-sm">
                                    <div className="aspect-video bg-slate-200 rounded-xl mb-2 overflow-hidden relative">
                                        <img src="https://images.unsplash.com/photo-1560518883-ce09059eeffa?w=300&q=80" className="w-full h-full object-cover" />
                                        <div className="absolute top-2 left-2 bg-black/60 text-white text-[8px] px-2 py-0.5 rounded font-bold uppercase">Verificado</div>
                                    </div>
                                    <p className="font-black text-slate-800 text-xs">{currentProp.address}</p>
                                </div>
                                <p className="font-bold text-slate-700">¿Querés agregar características extra? (ej: cochera, pileta).</p>
                            </div>
                        )}

                        {chatStep >= 2 && <div className="user-bubble animate-bubble">{currentProp.features}</div>}
                        
                        {/* PREGUNTA ADMINISTRADOR CONCRETA CON ESTILO CHAT */}
                        {chatStep === 2 && !isTyping && (
                            <div className="bot-bubble animate-bubble space-y-2">
                                <p>Propiedad asociada con éxito a tu perfil de dueño.</p>
                                <p className="font-bold text-[#0055DD] italic">¿Querés permitirle a un administrador manejar esta unidad? Ingresá su correo electrónico o celular (WhatsApp).</p>
                            </div>
                        )}

                        {chatStep >= 3 && <div className="user-bubble animate-bubble">{currentProp.adminContact}</div>}

                        {/* RESULTADO BÚSQUEDA DE ADMINISTRADOR (SIMULA BÚSQUEDA REAL) */}
                        {chatStep === 4 && !isTyping && (
                            <div className="bot-bubble animate-bubble space-y-4">
                                {currentProp.adminFound ? (
                                    <div className="p-4 bg-indigo-50 border border-indigo-200 rounded-2xl space-y-2">
                                        <div className="flex items-center gap-2 text-indigo-700 font-black text-xs uppercase">
                                            <Icon name="check-circle" size={16} /> ¡Administrador Encontrado!
                                        </div>
                                        <p className="font-bold text-slate-800 text-sm">{currentProp.adminFound.name}</p>
                                        <p className="text-[10px] text-slate-500">{currentProp.adminFound.email} • {currentProp.adminFound.phone}</p>
                                        <button onClick={saveCurrentPropertyAndContinue} className="w-full mt-2 py-3 bg-indigo-600 text-white rounded-xl font-black text-xs uppercase tracking-widest shadow-md">
                                            Confirmar Administrador y Continuar
                                        </button>
                                    </div>
                                ) : (
                                    <div className="p-4 bg-amber-50 border border-amber-200 rounded-2xl space-y-2">
                                        <div className="flex items-center gap-2 text-amber-700 font-black text-xs uppercase">
                                            <Icon name="user-plus" size={16} /> No está en DptoLibre
                                        </div>
                                        <p className="text-xs text-amber-800 leading-relaxed">
                                            El gestor ingresado no posee cuenta activa en la red. Le enviaremos una invitación formal para que administre tu unidad.
                                        </p>
                                        <button onClick={saveCurrentPropertyAndContinue} className="w-full mt-2 py-3 bg-slate-900 text-white rounded-xl font-black text-xs uppercase tracking-widest shadow-md">
                                            Enviar Invitación y Continuar
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                        {isTyping && (
                            <div className="bot-bubble flex items-center gap-1.5 py-3 w-max">
                                <div className="typing-dot"></div><div className="typing-dot"></div><div className="typing-dot"></div>
                            </div>
                        )}
                    </div>

                    {/* Input Chat Conversacional Activo en Pasos 0, 1 y 3 */}
                    {(chatStep === 0 || chatStep === 1 || chatStep === 3) && !isTyping && (
                        <footer className="p-4 bg-white border-t sticky bottom-0 z-20">
                            <div className="flex gap-2">
                                <input 
                                    type="text" 
                                    value={chatInput}
                                    onChange={(e) => setChatInput(e.target.value)}
                                    onKeyDown={(e) => e.key === 'Enter' && handleChatSend()}
                                    placeholder={
                                        chatStep === 0 ? "Escribe la dirección exacta..." : 
                                        chatStep === 1 ? "Ej: Cochera, 2 dormitorios..." : 
                                        "Email o celular (WhatsApp) del administrador..."
                                    }
                                    className="flex-1 bg-slate-50 border px-4 py-3 rounded-xl text-sm font-bold outline-none focus:border-[#0055DD]"
                                    autoFocus
                                />
                                <button onClick={() => handleChatSend()} className="bg-[#0055DD] text-white w-12 h-12 rounded-xl flex items-center justify-center shadow-md active:scale-95 transition-transform shrink-0">
                                    <Icon name="send" size={18} />
                                </button>
                            </div>
                        </footer>
                    )}
                </div>
            );

            // --- 7. HOME DEL PROPIETARIO CON QR DE COMPARTIR ---
            const HomeOwnerView = () => (
                <div className="mobile-shell bg-[#F0F2F6] flex flex-col animate-in overflow-y-auto no-scrollbar pb-24">
                    <header className="p-6 bg-slate-900 text-white flex justify-between items-center rounded-b-[2.5rem] shadow-xl">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-full border-2 border-emerald-400 overflow-hidden bg-slate-800">
                                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Roberto" alt="Owner" />
                            </div>
                            <div>
                                <h3 className="text-xs font-black leading-none">Roberto Gomez</h3>
                                <p className="text-[9px] font-bold text-emerald-400 uppercase mt-1">Propietario Verificado</p>
                            </div>
                        </div>
                        <Icon name="bell" size={20} className="text-slate-400" />
                    </header>

                    <main className="p-6 space-y-6">
                        {/* Saldo Líquido */}
                        <div className="bg-white p-6 rounded-[2.5rem] border shadow-sm">
                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Saldo Líquido a Cobrar</p>
                            <h2 className="text-3xl font-black text-slate-900 tracking-tighter mb-4">$760.400</h2>
                            <button className="w-full bg-emerald-500 text-slate-900 py-3.5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-emerald-500/20 active:scale-95 transition-all">
                                Retirar a mi Cuenta
                            </button>
                        </div>

                        {/* Propiedades del Dueño con Código QR */}
                        <div className="space-y-3">
                            <div className="flex justify-between items-center px-1">
                                <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Mis Propiedades Asociadas ({propertiesList.length || 2})</h4>
                                <button onClick={() => setView('count_properties')} className="text-[#0055DD] text-[10px] font-black uppercase flex items-center gap-1">
                                    <Icon name="plus" size={14}/> Agregar Activo
                                </button>
                            </div>
                            
                            {(propertiesList.length > 0 ? propertiesList : [
                                { address: "Caseros 1230, 4B", features: "Cochera", adminContact: "Inmobiliaria Raíces" },
                                { address: "Av. Hipólito Yrigoyen 850", features: "Pileta", adminContact: "Gestiones del Sur" }
                            ]).map((prop, idx) => (
                                <div key={idx} className="bg-white p-5 rounded-3xl border shadow-sm space-y-3">
                                    <div className="flex items-center justify-between">
                                        <div className="flex items-center gap-3">
                                            <div className="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center font-bold">
                                                <Icon name="shield-check" size={20} />
                                            </div>
                                            <div>
                                                <h5 className="font-black text-slate-800 text-xs">{prop.address}</h5>
                                                <p className="text-[9px] text-slate-400 font-bold uppercase">{prop.adminFound ? `Admin: ${prop.adminFound.name}` : prop.adminContact ? `Admin: ${prop.adminContact}` : 'Sin admin asignado'}</p>
                                            </div>
                                        </div>
                                        <span className="text-xs font-black text-emerald-600">$450.000</span>
                                    </div>
                                    <div className="pt-2 border-t border-slate-50 flex items-center justify-between">
                                        <div className="flex items-center gap-2 text-[10px] text-indigo-600 font-bold">
                                            <Icon name="qr-code" size={16} /> QR de Propiedad Activo
                                        </div>
                                        <button onClick={() => alert("Código QR copiado al portapapeles para compartir con inquilinos o para cargar la administración en cualquier momento.")} className="text-[9px] font-black bg-slate-100 text-slate-600 px-3 py-1 rounded-lg uppercase">
                                            Compartir QR
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* Nav inferior */}
                    <nav className="absolute bottom-0 w-full bg-white border-t p-4 flex justify-around items-center">
                        <div className="text-[#0055DD] flex flex-col items-center gap-1"><Icon name="home"/><span className="text-[8px] font-black uppercase">Inicio</span></div>
                        <div className="text-slate-300 flex flex-col items-center gap-1"><Icon name="file-text"/><span className="text-[8px] font-black uppercase">Contratos</span></div>
                        <div className="text-slate-300 flex flex-col items-center gap-1"><Icon name="wallet"/><span className="text-[8px] font-black uppercase">Dinero</span></div>
                    </nav>
                </div>
            );

            return (
                <div className="h-screen w-full flex flex-col items-center justify-center p-4">
                    <div className="mobile-shell">
                        {/* Notch */}
                        <div className="absolute top-0 left-1/2 -translate-x-1/2 w-40 h-7 bg-[#0D1B4B] rounded-b-3xl z-[150] flex items-center justify-center gap-2 shadow-sm">
                            <div className="w-1.5 h-1.5 rounded-full bg-white/20"></div>
                            <div className="w-10 h-1 bg-white/20 rounded-full"></div>
                        </div>

                        {view === 'login' && <LoginView />}
                        {view === 'role_selection' && <RoleSelectionView />}
                        {view === 'check_active' && <CheckActiveView />}
                        {view === 'val_biometric' && <BiometricValidationView />}
                        {view === 'reconf_propiedades' && <ReconfPropiedadesView />}
                        {view === 'count_properties' && <CountPropertiesView />}
                        {view === 'chat_propiedad' && <ChatPropiedadView />}
                        {view === 'home_owner' && <HomeOwnerView />}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<OwnerApp />);
    </script>
</body>
</html>
